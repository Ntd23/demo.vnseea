upstream nuxt_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 8080;
    listen 8443 ssl;
    server_name demo.vnseea.test *.demo.vnseea.test;

    root "D:/Duong/src/laragon/www/demo.vnseea";
    index index.php index.html index.htm;
    charset utf-8;
    client_max_body_size 512M;

    ssl_certificate "D:/Duong/src/laragon/etc/ssl/laragon.crt";
    ssl_certificate_key "D:/Duong/src/laragon/etc/ssl/laragon.key";
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers ALL:!ADH:!EXPORT56:RC4+RSA:+HIGH:+MEDIUM:+LOW:+SSLv3:+EXP;
    ssl_prefer_server_ciphers on;

    location = /favicon.ico { access_log off; log_not_found off; }
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /cache {
        deny all;
        return 404;
    }

    location /sources {
        deny all;
        return 404;
    }

    location /nodejs {
        deny all;
        return 404;
    }

    location /adminPages/ {
        alias "D:/Duong/src/laragon/www/demo.vnseea/admin-panel/";
    }

    location /upload/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /themes/ {
        expires 7d;
        try_files $uri =404;
    }

    location /assets/ {
        expires 7d;
        try_files $uri =404;
    }

    location ^~ /_nuxt/ {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /__vite_ping {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /@vite/ {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /@id/ {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /@fs/ {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admincp {
        rewrite ^ /admincp.php last;
    }

    location /admincp {
        rewrite ^/admincp/(.*)$ /admincp.php?page=$1 last;
    }

    location /admin {
        rewrite ^/admin-cp$ /admincp.php last;
        rewrite ^/admin-cp/(.*)$ /admincp.php?page=$1 last;
        rewrite ^/admin/ads/edit/(\d+)(/?|)$ /index.php?link1=manage-ads&id=$1 last;
    }

    location /api {
        rewrite ^/api(/?|)$ /api-v2.php last;
        rewrite ^/api/([^\/]+)(\/|)$ /api-v2.php?type=$1 last;
    }

    location ~ ^/(ajax_loading|requests|login-with|call|call_livekit|call_group_livekit|call_jitsi|cron-job|OneSignalSDKWorker|api-v2|api|app_api|admin_load|system_status|updater)\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
    }

    location / {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}
